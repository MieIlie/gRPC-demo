<div class="auth-card" id="auth-card-view">
    <h1 class="auth-title" id="auth-title-text">Welcome Back</h1>
    <form id="auth-form">
        <div class="form-group" id="display-name-group" style="display: none;">
            <label class="form-label" for="display-name-input">Display Name</label>
            <input class="form-input" type="text" id="display-name-input" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label class="form-label" for="username-input">Username</label>
            <input class="form-input" type="text" id="username-input" placeholder="johndoe" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password-input">Password</label>
            <input class="form-input" type="password" id="password-input" placeholder="••••••••" required>
        </div>
        <button class="btn" type="submit" id="auth-submit-btn">Login</button>
    </form>
    <div class="auth-switch">
        <span id="auth-switch-text">Don't have an account?</span>
        <a href="#" id="auth-switch-link">Register</a>
    </div>
</div>
