<div class="auth-card" style="max-width: 480px; text-align: center; position: fixed; top: 15%; left: 50%; transform: translateX(-50%); z-index: 1000; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 12px; display: none;" id="call-overlay-view">
    <h2 class="auth-title" id="call-status-title">Call Connection</h2>
    
    <div style="display: flex; justify-content: center; gap: 2rem; margin: 1.5rem 0;" id="call-avatars-container">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div class="avatar" id="local-avatar" style="width: 60px; height: 60px; font-size: 1.5rem;">L</div>
            <span style="font-size: 0.9rem; color: var(--text-secondary);">You</span>
        </div>
        <div style="align-self: center; font-size: 1.5rem; color: var(--primary);">⚡</div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div class="avatar" id="remote-avatar" style="width: 60px; height: 60px; font-size: 1.5rem; background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);">R</div>
            <span style="font-size: 0.9rem; color: var(--text-secondary);" id="remote-user-name">Remote User</span>
        </div>
    </div>

    <!-- Video Streams Container -->
    <div id="call-video-container" style="display: none; flex-direction: column; gap: 1rem; margin: 1.5rem 0; width: 100%;">
        <div style="position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 16/9;">
            <video id="remote-video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
            <video id="local-video" autoplay playsinline muted style="position: absolute; bottom: 10px; right: 10px; width: 30%; aspect-ratio: 16/9; border-radius: 4px; border: 2px solid var(--primary); background: #000; object-fit: cover;"></video>
        </div>
    </div>

    <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
        <button class="btn" id="accept-call-btn" style="background: var(--success); flex: 1; display: none;">Accept</button>
        <button class="btn" id="reject-call-btn" style="background: var(--error); flex: 1;">Decline</button>
    </div>
</div>
