<div class="auth-card" style="max-width: 480px; text-align: center; position: absolute; top: 10%; z-index: 100;" id="call-overlay-view">
    <h2 class="auth-title" id="call-status-title">Call Connection</h2>
    
    <div style="display: flex; justify-content: center; gap: 2rem; margin: 2rem 0;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div class="avatar" id="local-avatar" style="width: 60px; height: 60px; font-size: 1.5rem;">L</div>
            <span style="font-size: 0.9rem; color: var(--text-secondary);">You</span>
        </div>
        <div style="align-self: center; font-size: 1.5rem; color: var(--primary);">⚡</div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div class="avatar" id="remote-avatar" style="width: 60px; height: 60px; font-size: 1.5rem; background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);">R</div>
            <span style="font-size: 0.9rem; color: var(--text-secondary);" id="remote-user-name">Remote User</span>
        </div>
    </div>

    <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
        <button class="btn" id="accept-call-btn" style="background: var(--success); flex: 1; display: none;">Accept</button>
        <button class="btn" id="reject-call-btn" style="background: var(--error); flex: 1;">Decline</button>
    </div>
</div>
