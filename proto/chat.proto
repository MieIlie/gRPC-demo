syntax = "proto3";

package chat;

option go_package = "gen/chat;chat";

import "google/protobuf/timestamp.proto";

enum RoomType {
    DIRECT = 0;
    GROUP = 1;
}

enum MessageType {
    TEXT = 0;
    IMAGE = 1;
    SYSTEM = 2;
}

service ChatService {
    rpc CreateRoom (CreateRoomRequest) returns (CreateRoomResponse);
    rpc GetRooms (GetRoomsRequest) returns (GetRoomsResponse);
    rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);
    rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse);
    rpc GetRoomMembers (GetRoomMembersRequest) returns (GetRoomMembersResponse);
}

message Room {
    string id = 1;
    RoomType room_type = 2;
    string room_name = 3;
    string created_by = 4;
    google.protobuf.Timestamp created_at = 5;
}

message Message {
    string id = 1;
    string room_id = 2;
    string sender_id = 3;
    string content = 4;
    MessageType message_type = 5;
    google.protobuf.Timestamp created_at = 6;
}

message RoomMember {
    string room_id = 1;
    string user_id = 2;
    google.protobuf.Timestamp joined_at = 3;
    string display_name = 4;
    string username = 5;
}

message CreateRoomRequest {
    RoomType room_type = 1;
    string room_name = 2;
    string created_by = 3;
    repeated string member_ids = 4;
}

message CreateRoomResponse {
    Room room = 1;
}

message GetRoomsRequest {
    string user_id = 1;
}

message GetRoomsResponse {
    repeated Room rooms = 1;
}

message SendMessageRequest {
    string room_id = 1;
    string sender_id = 2;
    string content = 3;
    MessageType message_type = 4;
}

message SendMessageResponse {
    Message message = 1;
}

message GetMessagesRequest {
    string room_id = 1;
    int32 limit = 2;
    google.protobuf.Timestamp before_timestamp = 3;
}

message GetMessagesResponse {
    repeated Message messages = 1;
}

message GetRoomMembersRequest {
    string room_id = 1;
}

message GetRoomMembersResponse {
    repeated RoomMember members = 1;
}
